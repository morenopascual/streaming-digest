name: Daily Streaming Digest

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install feedparser requests

      - name: Ejecutar fetch_digest.py
        run: python fetch_digest.py

      - name: Commit y push de digest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.json
          git diff --staged --quiet || git commit -m "digest: actualización automática $(date -u +%Y-%m-%d)"
          git push
