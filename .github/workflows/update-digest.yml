name: Actualizar Digest
on:
  workflow_dispatch:
  schedule:
    - cron: '15 7 * * 1-5'   # Lunes–viernes 09:15 Madrid (CEST)
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install feedparser anthropic

      - name: Generar digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git pull --rebase origin main && git commit -m "Digest $(date +'%d/%m/%Y')" && git push)
