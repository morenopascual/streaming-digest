name: Actualizar Digest

on:
  workflow_dispatch:          # Lanzamiento manual (botón de la web)
  schedule:
    - cron: '15 7 * * 1-5'   # Lunes–viernes 07:15 UTC = 09:15 hora Madrid (CEST)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install feedparser anthropic

      - name: Generar digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Digest $(date +'%d/%m/%Y')"
          git push
